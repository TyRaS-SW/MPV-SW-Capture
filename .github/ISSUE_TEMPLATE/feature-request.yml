name: 💡 Feature request
description: Suggest a new feature or improvement for MPV-SW-Capture
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to propose new options, menu entries, or improvements.

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and discussions and did not find this request
          required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like to see added or improved?
      description: Describe the feature or change you are thinking about.
      placeholder: "Example: An option in the menu to quickly switch between two capture cards..."
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: Explain how this helps your workflow or other users.
      placeholder: "Example: This would make it faster to..."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Current workaround (if any)
      description: How are you handling this today, if at all?
      placeholder: "Example: Right now I have to edit config manually..."
    validations:
      required: false